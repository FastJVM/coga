[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relay-os"
version = "0.2.0"
description = "A blackboard for humans and agents — CLI."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Relay contributors" },
]
dependencies = [
  "typer>=0.12",
  "rich>=13",
  "PyYAML>=6",
  "tomli-w>=1",
  "croniter>=2",
  "requests>=2.31",
]

[project.scripts]
relay = "relay.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/relay"]

[tool.hatch.build.targets.wheel.force-include]
"src/relay/resources" = "relay/resources"
