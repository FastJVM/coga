name: Release

# Build + publish via PyPI Trusted Publishing (OIDC) — no stored API tokens.
#   - cutting a GitHub Release        -> publish to PyPI
#   - manual run (workflow_dispatch)  -> publish to TestPyPI (dry run) or PyPI
# Build and publish run in ONE job (no artifact handoff) so a release never
# depends on Actions artifact storage. One-time setup: docs/releasing.md.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Index to publish to
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

permissions: {}

jobs:
  testpypi:
    name: Build + publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/coga
    permissions:
      contents: read     # clone the repo
      id-token: write    # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Build
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Build + publish to PyPI
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/coga
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Build
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
