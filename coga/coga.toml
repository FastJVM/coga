version = 1

# Default status for new tasks. Tickets stay `draft` until approved —
# `coga launch` activates a draft inline, or `coga mark active` activates
# it without launching.
default_status = "draft"

# --- Agents ---
# Permission-skip policy for `autonomy: auto` launches (`skip_permissions`,
# `skip_permissions_argv`) is machine-local and belongs in a partial
# `[agents.<name>]` table in coga.local.toml — committing those keys
# here fails config load.

[agents.claude]
cli = "claude"
auto = "-p"
file = "CLAUDE.md"
mode = "local"
# `claude -n <name>` sets the session display name shown in the /resume
# picker, the prompt box, and the terminal title. Skipped in discussion
# launches so the human's first ask names the session.
name_flag = "-n"
# `claude --session-id <uuid>` lets Coga deterministically recover the
# transcript usage for exactly the session it launched.
session_id_flag = "--session-id"
# `discussion` rides the composed prompt as system context for discussion
# sessions (`coga chat`, `coga ticket`) so the human's first ask becomes
# the session title instead of a 20KB Coga prompt.
discussion = "--append-system-prompt {prompt}"

[agents.codex]
cli = "codex"
auto = "exec"
file = "AGENTS.md"
mode = "local"
discussion = "-c developer_instructions={prompt}"

# --- Notification channels ---
# Coga's notification system is the team sync point. Slack is the first
# channel: urgent/manual events post through the Slack webhook, while outcome
# events may spool into the daily digest before that digest posts to Slack.
# Relaunching an already-in-progress ticket does not post.
#
# Use `env:` indirection so
# the URL (a bearer token) stays out of this committed file — each user exports
# SLACK_WEBHOOK_URL locally and coga resolves it. A bare exported
# SLACK_WEBHOOK_URL with no `webhook` key is only a deprecated compatibility
# fallback. A machine-specific webhook may override this in coga.local.toml
# (local wins). To opt out (solo / dev / CI), set
# `[notification.slack].enabled = false` in
# coga.local.toml.
[notification]
channels = ["slack"]

[notification.slack]
webhook = "env:SLACK_WEBHOOK_URL"
