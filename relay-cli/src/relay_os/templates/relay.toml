# Empty skeleton for relay.toml.
#
# Copy to `relay.toml` at the repo root, then populate the sections
# below. See `relay.toml.example` for a walkthrough with realistic
# values and comments on every field.
#
# This file is one of two canonical schema references (the other is
# `relay.toml.example`). Adding a field to the schema means adding a
# line here and in the example — the pydantic models in
# `relay-cli/src/relay_os/config.py` derive from these templates.

version = 1

# [projects.<name>] — one block per project.
#   type            = "local" | "repo"
#   default_status  = "design" | "ready" | "active" | "paused"
#                   | "done" | "canceled" | "failed"           (default: "ready")
#   remote          = git URL                                  (only for type="repo")

# [agents.<name>] — one block per agent type.
#   cli          — binary name on PATH
#   interactive  — flag for prompt-loading in interactive mode
#   auto         — flag for prompt-loading in auto mode
#   file         — fallback instruction file
#   mode         = "local"                                     (default; only value today)

# [assignees.<user>] — one block per human on the team.
#   agents = { nickname1 = agent-type, ... }
#   slack  = Slack user ID for @mentions                       (default: "")

# [slack] — reserved for future shared Slack config. Leave empty.
[slack]
