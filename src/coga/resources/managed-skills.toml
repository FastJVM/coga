# Coga-managed skills installed into coga-os/skills through `coga skill`.
#
# Skills bundled in the package live under coga-os/bootstrap/skills and need no
# entry here (they work offline) — this includes the gmail / google-calendar /
# calendar-reminder / browser capabilities. Entries below are optional domain
# skills still fetched from a public source at init/update; a failed fetch warns
# rather than failing init.

