version = 1

# Default status for new tasks. Tickets stay `draft` until the human
# approves and runs `relay mark active`.
default_status = "draft"

# --- Agents ---
# Agent types. Each defines the CLI binary and how to invoke it.

[agents.claude]
cli = "claude"
auto = "-p"
file = "CLAUDE.md"
mode = "local"

[agents.codex]
cli = "codex"
auto = "exec"
file = "AGENTS.md"
mode = "local"

# --- Slack ---
# Slack is the team sync point — every state change (ticket created,
# draft → active, active → in_progress, paused/done, bump, panic, slack,
# script-mode failure, recurring scaffolds) posts to the channel pointed at by
# `$SLACK_WEBHOOK_URL`. Relaunching an already-in-progress ticket does not post. Each
# user exports the env var locally (the URL itself is a bearer token;
# never commit it).
# `relay validate --check-slack` probes the webhook so dead URLs surface
# at config time, not at first bump.
#
# To opt out (solo runs, dev/test, CI without notifications), uncomment
# in relay.local.toml:
#   [slack]
#   enabled = false
#
# Optional: attach a GIF to milestone events. One URL is picked at random
# per post. Skip a kind (or leave its list empty) to keep that event
# text-only. Example:
#   [slack.gifs]
#   done  = ["https://media.giphy.com/media/<id>/giphy.gif"]
#   panic = [
#     "https://media.giphy.com/media/<id-a>/giphy.gif",
#     "https://media.giphy.com/media/<id-b>/giphy.gif",
#   ]

# --- Aliases ---
# Thin sugar for often-used commands. Each entry maps a name to an
# expanded relay command (free-form string). Positional args after the
# alias name are forwarded to the expansion. Alias names cannot collide
# with built-in commands.

[aliases]
chat = "launch bootstrap/orient"
# Uncomment to add per-agent shortcuts. The --agent value must match an
# `[agents.*]` block above.
# claude = "launch bootstrap/orient --agent claude"
# codex = "launch bootstrap/orient --agent codex"
