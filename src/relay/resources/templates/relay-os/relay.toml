version = 1

# Default status for new tasks. Tickets stay `draft` until the human
# approves and runs `relay launch` (which flips them to `active`).
default_status = "draft"

# --- Agents ---
# Agent types. Each defines the CLI binary and how to invoke it.

[agents.claude]
cli = "claude"
interactive = "--append-system-prompt-file"
auto = "-p"
file = "CLAUDE.md"
mode = "local"

[agents.codex]
cli = "codex"
interactive = "exec"
auto = "exec"
file = "AGENTS.md"
mode = "local"

# --- Assignees ---
# Humans, with their per-person agent nicknames.

# [assignees.you]
# agents = {"claude1" = "claude"}

# --- Slack ---
# Slack is the team sync point — bump/feed/panic and script-mode
# failures all post to the channel pointed at by `$SLACK_WEBHOOK_URL`.
# Each user exports the env var locally (the URL itself is a bearer
# token; never commit it).
# `relay validate --check-slack` probes the webhook so dead URLs surface
# at config time, not at first bump.
#
# To opt out (solo runs, dev/test, CI without notifications), uncomment
# in relay.local.toml:
#   [slack]
#   enabled = false

# --- Aliases ---
# Thin sugar for often-used commands. Each entry maps a name to an
# expanded relay command (free-form string). Positional args after the
# alias name are forwarded to the expansion. Alias names cannot collide
# with built-in commands.

[aliases]
chat = "launch bootstrap/orient"
create = "launch bootstrap/ticket"
