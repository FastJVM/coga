# Relay-managed skills installed into relay-os/skills through `relay skill`.
#
# Core Relay control-plane skills stay package-backed under
# relay-os/bootstrap/skills so `relay init` works offline. Entries here are
# optional domain skills: init/update attempts them through the public skill
# installer and warns, rather than failing, when the source or `gh skill` is not
# available.

