version = 1

# Default status for new tasks. Tickets stay `draft` until the human
# approves and runs `relay mark active`.
default_status = "draft"

# --- Agents ---

[agents.claude]
cli = "claude"
auto = "-p"
file = "CLAUDE.md"
mode = "local"
# `claude -n <name>` sets the session display name shown in the /resume
# picker, the prompt box, and the terminal title. Skipped in discussion
# launches so the human's first ask names the session.
name_flag = "-n"
# `discussion` rides the composed prompt as system context for discussion
# sessions (`relay chat`, `relay ticket`) so the human's first ask becomes
# the session title instead of a 20KB Relay prompt.
discussion = "--append-system-prompt {prompt}"

[agents.codex]
cli = "codex"
auto = "exec"
file = "AGENTS.md"
mode = "local"
discussion = "-c developer_instructions={prompt}"

# --- Slack ---
# Slack is the team sync point — every state change (ticket created,
# draft → active, active → in_progress, paused/done, bump, panic, slack,
# script-mode failure, recurring scaffolds) posts to the channel pointed at by
# `$SLACK_WEBHOOK_URL`. Relaunching an already-in-progress ticket does not post. Each
# user exports the env var locally (the URL itself is a bearer token;
# never commit it).
# To opt out (solo / dev / CI), set `[slack].enabled = false` in
# relay.local.toml.
#
# Optional GIFs on milestone events. One URL is picked at random per
# post. Skip a kind to keep it text-only.
