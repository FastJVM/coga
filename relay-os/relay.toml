version = 1

# Default status for new tasks. Tickets stay `draft` until the human
# approves and runs `relay launch` (which flips them to `active`).
default_status = "draft"

# --- Agents ---

[agents.claude]
cli = "claude"
interactive = "--append-system-prompt-file"
auto = "-p"
file = "CLAUDE.md"
mode = "local"

[agents.codex]
cli = "codex"
interactive = "exec"
auto = "exec"
file = "AGENTS.md"
mode = "local"

# --- Assignees ---

[assignees.nick]
agents = {"claude1" = "claude", "codex1" = "codex"}

# --- Slack ---
# Slack is the team sync point — bump/feed/panic/launch all post to the
# channel pointed at by `$SLACK_WEBHOOK_URL`. Each user exports the env
# var locally (the URL itself is a bearer token; never commit it).
# To opt out (solo / dev / CI), set `[slack].enabled = false` in
# relay.local.toml.

# --- Aliases ---
# Thin sugar over often-used commands (typically bootstrap-shim launches).
# Aliases forward positional args after the alias name to the expanded form.

[aliases]
chat = "launch bootstrap/orient"
create = "launch bootstrap/ticket"
