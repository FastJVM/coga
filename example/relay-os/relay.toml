version = 1

# Default status for new tasks. Tickets stay `draft` until the human
# approves and runs `relay mark active`.
default_status = "draft"

# --- Agents ---

[agents.claude]
cli = "claude"
interactive = ""
auto = "-p --output-format stream-json --include-partial-messages --verbose"
file = "CLAUDE.md"
mode = "local"

[agents.codex]
cli = "codex"
interactive = ""
auto = "exec"
file = "AGENTS.md"
mode = "local"

# --- Assignees ---

[assignees.marc]
agents = {"claude1" = "claude", "claude2" = "claude", "codex1" = "codex"}

[assignees.pierre]
agents = {"claude1" = "claude"}

# --- Slack ---

# Omit `webhook` to run without real Slack posts (messages go to stderr).
# [slack]
# webhook = "https://hooks.slack.com/services/xxx"

# --- Aliases ---
# Thin sugar for often-used commands. Each entry maps a name to an
# expanded relay command. Positional args after the alias name forward
# to the expansion. Alias names cannot collide with built-in commands.

[aliases]
chat = "launch bootstrap/orient"
claude = "launch bootstrap/orient --agent claude1"
codex = "launch bootstrap/orient --agent codex1"
