version = 1

# Default status for new tasks. Tickets stay `draft` until approved —
# `relay launch` activates a draft inline, or `relay mark active` activates
# it without launching.
default_status = "draft"

# --- Agents ---

[agents.claude]
cli = "claude"
auto = "-p"
file = "CLAUDE.md"
mode = "local"
# `claude -n <name>` sets the session display name shown in the /resume
# picker, the prompt box, and the terminal title.
name_flag = "-n"
discussion = "--append-system-prompt {prompt}"

[agents.codex]
cli = "codex"
auto = "exec"
file = "AGENTS.md"
mode = "local"
discussion = "-c developer_instructions={prompt}"

# --- Notification channels ---

# Slack is Relay's first notification channel. Use `env:` indirection so
# the URL (a bearer token) stays out of the committed file — export
# SLACK_WEBHOOK_URL locally and relay resolves it. Local `relay.local.toml`
# may override this with a machine-specific webhook. To run without real
# posts (messages go to stderr), opt out with
# `[notification.slack].enabled = false` in relay.local.toml.
[notification]
channels = ["slack"]

[notification.slack]
webhook = "env:SLACK_WEBHOOK_URL"

# --- Aliases ---
# Thin sugar for often-used commands. Each entry maps a name to an
# expanded relay command. Positional args after the alias name forward
# to the expansion. Alias names cannot collide with built-in commands.

[aliases]
chat = "launch bootstrap/orient"
claude = "launch bootstrap/orient --agent claude"
codex = "launch bootstrap/orient --agent codex"
