# Local per-machine config. `coga.local.toml` is gitignored in a real repo;
# this copy ships with the example so the smoke test has something to read.

user = "marc"

# Secrets are declared inline on each ticket's `secrets:` frontmatter
# (`NAME: op://vault/item/field` or `NAME: env:VAR`) — there is no central
# [secrets] catalog.

# Per-agent permission-skip policy for `mode: auto` task launches —
# machine-local only; either key in shared coga.toml fails config load.
# [agents.claude]
# skip_permissions = "auto"
# skip_permissions_argv = "--dangerously-skip-permissions"
