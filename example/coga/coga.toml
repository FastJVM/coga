version = 1

# Default status for new tasks. Tickets stay `draft` until approved —
# `coga launch` activates a draft inline, or `coga mark active` activates
# it without launching.
default_status = "draft"

# --- Agents ---

[agents.claude]
cli = "claude"
file = "CLAUDE.md"
mode = "local"
# `claude -n <name>` sets the session display name shown in the /resume
# picker, the prompt box, and the terminal title.
name_flag = "-n"
session_id_flag = "--session-id"
discussion = "--append-system-prompt {prompt}"

[agents.codex]
cli = "codex"
file = "AGENTS.md"
mode = "local"
discussion = "-c developer_instructions={prompt}"

# --- Notification channels ---

# Notifications are optional on first run: no channels are selected, so this
# repo runs draft/mark/launch/bump without any setup. Turn Slack on when you
# start coordinating with other people by selecting the channel and pointing
# it at a webhook (use `env:` indirection so the bearer-token URL stays out of
# the committed file):
#
#   [notification]
#   channels = ["slack"]
#
#   [notification.slack]
#   webhook = "env:SLACK_WEBHOOK_URL"
#
# Once Slack is selected it is fail-loud — a missing/revoked/unreachable
# webhook crashes the command rather than dropping the message. To keep it
# selected but temporarily silent, set `[notification.slack].enabled = false`
# in coga.local.toml.
[notification]
channels = []

# --- Aliases ---
# Thin sugar for often-used commands. Each entry maps a name to an
# expanded coga command. Positional args after the alias name forward
# to the expansion. Alias names cannot collide with built-in commands.

[aliases]
chat = "launch bootstrap/orient"
claude = "launch bootstrap/orient --agent claude"
codex = "launch bootstrap/orient --agent codex"
